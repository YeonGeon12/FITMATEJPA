# Project name
spring.application.name=FITMATE

# Spring Boot Web Server Port
server.port = 11000

# MariaDB Setting
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url={YOUR DB IP}
spring.datasource.username={YOUR DB NAME}
spring.datasource.password={YOUR DB PASSWORD}

# MongoDB Setting
spring.data.mongodb.host={YOUR DB IP}
spring.data.mongodb.port=27017
spring.data.mongodb.database={YOUR DB NAME}
spring.data.mongodb.username={YOUR DB USER NAME}
spring.data.mongodb.password={YOUR DB PASSWORD}

# JPA Setting

# DDL disable
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none

# Disable entity persistence context after SQL execution and transaction completion
spring.jpa.open-in-view=false

# Show SQL queries executed by JPA
spring.jpa.show-sql=true

# Format SQL queries for better readability
spring.jpa.properties.hibernate.format_sql=true

# Show comments in SQL queries (e.g., repository method names)
spring.jpa.properties.hibernate.use_sql_comments=true

# Prevent JPA from automatically converting table names to lowercase
# Some databases are case-sensitive and this could cause table-not-found errors
# Use physical table names as defined in the entity class
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# thymeleaf Setting
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# MAIL Setting
spring.mail.host=smtp.naver.com
spring.mail.port=465
spring.mail.username={YOUR MAIL}
spring.mail.password={PASSWORD}
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.naver.com

# LOG LEVEL (DEBUG)
logging.level.kopo.fitmate=DEBUG